<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    
    <style>
        @font-face {
            font-family: "Driftwood";
            src: local("Driftwood"), local("DRIFTWOOD"), url("./DRIFTWOOD.ttf") format("truetype");
            font-display: swap;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            background:
                radial-gradient(circle at 15% 10%, rgba(47, 116, 171, 0.28) 0%, rgba(47, 116, 171, 0) 45%),
                radial-gradient(circle at 85% 20%, rgba(201, 169, 110, 0.2) 0%, rgba(201, 169, 110, 0) 42%),
                linear-gradient(160deg, #090b0f 0%, #11161d 55%, #0b0d12 100%);
        }

        h1 {
            animation: heroReveal 0.9s ease-out forwards, heroDrift 6s ease-in-out 0.9s infinite alternate, heroGradient 10s linear infinite;
            font-size: clamp(2.25rem, 11vw, 8rem);
            text-align: center;
            margin: 0;
            line-height: 1.05;
            font-weight: 400;
            font-family: "Driftwood", "Times New Roman", serif;
            background: linear-gradient(90deg, #ff6a00, #ffd800, #00d4ff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        p {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: aliceblue;
            text-align: center;
            font-weight: 400;
            margin: 0;
            animation: paragraphReveal 1.1s ease-out 0.2s both;
        }

        .name {
            display: inline-block;
            font-family: 'Cinzel Decorative', serif;
            font-weight: 700;
            color: #c9a96e;
            letter-spacing: 0.08em;
            animation: nameGlow 3.5s ease-in-out 1.2s infinite;
        }

        .button {
            --primary: #ffd47e;
            --neutral-1: #0c1118;
            --neutral-2: #162230;
            --radius: 14px;

            cursor: pointer;
            border-radius: var(--radius);
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.6);
            border: none;
                box-shadow: 0 0 0 1px rgba(201, 169, 110, 0.28),
                0 10px 22px rgba(0, 0, 0, 0.5), 0 0 18px rgba(47, 116, 171, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s ease;
            min-width: 200px;
            padding: 20px;
            height: 68px;
            font-family: 'Cinzel Decorative', serif;
            font-style: normal;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.07em;
            color: #f6e6c7;
            margin: 1.5rem 0 0;
        }

        .button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 0 1px rgba(201, 169, 110, 0.45),
                0 15px 30px rgba(0, 0, 0, 0.38), 0 0 22px rgba(0, 212, 255, 0.24);
        }

        .button:active {
            transform: scale(1);
            box-shadow: 0 0 0 1px rgba(201, 169, 110, 0.35),
                0 10px 3px -3px rgba(0, 0, 0, 0.2);
        }

        .button:after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: var(--radius);
            border: 2.5px solid transparent;
            background: linear-gradient(var(--neutral-1), var(--neutral-2)) padding-box,
                linear-gradient(to bottom, rgba(255, 212, 126, 0.55), rgba(47, 116, 171, 0.45)) border-box;
            z-index: 0;
            transition: all 0.4s ease;
        }

        .button:hover::after {
            transform: scale(1.05, 1.1);
            box-shadow: inset 0 -1px 4px 0 rgba(255, 234, 189, 0.75);
        }

        .button::before {
            content: "";
            inset: 7px 6px 6px 6px;
            position: absolute;
            background: linear-gradient(to top, #0b1016, #152231 60%, #1a2f43);
            border-radius: 30px;
            filter: blur(0.5px);
            z-index: 2;
        }

        .state p {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            letter-spacing: normal;
            transition: color 0.25s ease, transform 0.25s ease;
        }

        .state .icon {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            margin: auto;
            transform: scale(1.25);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .state .icon svg {
            overflow: visible;
        }

        /* Outline */
        .outline {
            position: absolute;
            border-radius: inherit;
            overflow: hidden;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.4s ease;
            inset: -2px -3.5px;
        }

        .outline::before {
            content: "";
            position: absolute;
            inset: -100%;
            background: conic-gradient(from 180deg,
                    transparent 60%,
                    #ffd47e 78%,
                    #00d4ff 87%,
                    transparent 100%);
            animation: spin 2s linear infinite;
            animation-play-state: paused;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .button:hover .outline {
            opacity: 1;
        }

        .button:hover .outline::before {
            animation-play-state: running;
        }

        .button:hover .state p {
            color: var(--primary);
            transform: translateY(-1px);
        }

        /* Plane */
        .state--default .icon svg {
            animation: land 0.6s ease forwards;
        }

        .button:hover .state--default .icon {
            transform: rotate(45deg) scale(1.25);
        }

        @keyframes land {
            0% {
                transform: translateX(-60px) translateY(30px) rotate(-50deg) scale(2);
                opacity: 0;
                filter: blur(3px);
            }

            100% {
                transform: translateX(0) translateY(0) rotate(0);
                opacity: 1;
                filter: blur(0);
            }
        }
a{
    text-decoration: none;
}
        /* Contrail */
        .state--default .icon:before {
            content: "";
            position: absolute;
            top: 50%;
            height: 2px;
            width: 0;
            left: -5px;
            background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.5));
        }

        /* States */
        .state {
            padding-left: 29px;
            padding-right: 29px;
            z-index: 2;
            display: flex;
            position: relative;
        }


        @keyframes heroReveal {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes heroDrift {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-6px);
            }
        }

        @keyframes heroGradient {
            from {
                background-position: 0% 50%;
            }

            to {
                background-position: 100% 50%;
            }
        }

        @keyframes paragraphReveal {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes nameGlow {
            0%,
            100% {
                text-shadow: 0 0 0 rgba(201, 169, 110, 0);
                transform: translateY(0);
            }

            50% {
                text-shadow: 0 0 12px rgba(201, 169, 110, 0.35);
                transform: translateY(-1px);
            }
        }
         @media (max-width: 440px) {
            h1 {
                font-size: clamp(2rem, 12vw, 3rem);
            }
            span{
                margin-top: 10px;
                max-width: 70%;
            }
        }
        @media (max-width: 700px) {
            h1{
                font-size: clamp(2.2rem, 11vw, 4.5rem);
            }
        }
        
    </style>
</head>

<body>
    <h1>My Portfolio</h1>
    <span>
    <p>Hey there!! I am <span class="name">AADARSH</span> a 13 year old programmer</p>
</span>

        <div class="outline"></div>
        <div class="state state--default">

                        <path
                            d="M10.11 14.4C9.92005 14.4 9.73005 14.33 9.58005 14.18C9.29005 13.89 9.29005 13.41 9.58005 13.12L13.16 9.53C13.45 9.24 13.93 9.24 14.22 9.53C14.51 9.82 14.51 10.3 14.22 10.59L10.64 14.18C10.5 14.33 10.3 14.4 10.11 14.4Z"

            </div>

        </div>
    </button>

</body>

</html>
